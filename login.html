<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PRESALES AR — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="assets/firebase-config.js"></script>
  <script src="assets/firebase-auth.js"></script>
  <script src="assets/theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3f7;
      --surface: #ffffff;
      --accent: #8a38fe;
      --accent-dark: #6f2ad4;
      --text: #0f0f0f;
      --text-muted: #888;
      --border: #e5e0f0;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .logo-icon svg { width: 26px; height: 26px; }
    .login-title {
      font-size: 20px; font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
    }
    .login-sub {
      font-size: 12px; color: var(--text-muted);
      margin-top: 6px; font-weight: 500;
    }
    .card {
      background: var(--surface);
      border-radius: 10px;
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(138,56,254,0.06);
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
    input {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; font-weight: 500;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { border-color: var(--accent); background: #fff; }
    .btn-login {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; font-weight: 700;
      padding: 13px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      width: 100%;
      background: var(--accent);
      color: #fff;
      letter-spacing: 0.04em;
      transition: background 0.2s;
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--accent-dark); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 11px 14px;
      border-radius: 5px;
      font-size: 12px; font-weight: 600;
      margin-bottom: 16px;
      display: none;
      background: #fee2e2; color: #991b1b;
      border: 1px solid #fecaca;
    }
    .alert.show { display: block; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-text {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="logo-icon">
        <svg fill="none" viewBox="0 0 26 26" stroke="#fff" stroke-width="2.5">
          <path d="M3 20 L10 13 L16 19 L23 8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="login-title">PRESALES AR</div>
      <div class="login-sub">Ingresá tus credenciales para continuar</div>
    </div>
    <div class="card">
      <div id="alertBox" class="alert"></div>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="inputEmail" placeholder="tu@email.com" autocomplete="username" required/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="inputPassword" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn-login" id="btnLogin">Ingresar →</button>
      </form>
    </div>
    <div class="footer-text">PRESALES AR v2.0 · Atos</div>
  </div>
  <script>
    // Si ya hay sesión activa, redirigir al index
    if (AUTH.getSession()) window.location.href = 'index.html';

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('inputEmail').value.trim();
      const password = document.getElementById('inputPassword').value;
      const btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Verificando...';
      const result = await AUTH.login(email, password);
      if (result.ok) {
        window.location.href = 'index.html';
      } else {
        document.getElementById('alertBox').textContent = result.error;
        document.getElementById('alertBox').classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Ingresar →';
      }
    }
  </script>
</body>
</html>
